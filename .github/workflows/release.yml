name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run verify

            - name: Build mandatory BRAT payload
              run: |
                  python3 publish.py

            - name: Verify tag and manifest version
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  version="$(node -p "require('./manifest.json').version")"
                  [ "$tag" = "$version" ] || {
                    echo "Tag $tag does not match manifest version $version" >&2
                    exit 1
                  }

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css
                      vault-os-v${{ github.ref_name }}.zip

            - name: Create BRAT draft release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  gh release create "$tag" \
                    --title="Vault OS $tag" \
                    --draft \
                    main.js manifest.json styles.css "vault-os-v$tag.zip"
